#cloud-config

# Deploy-time cloud-init for servers created from the openclaw snapshot.
# Fill in the values below before passing this as user-data when creating the server.
# The openclaw-setup.service will pick up this file on first boot and run:
#   openclaw onboard --install-daemon

write_files:
  - path: /root/openclaw.env
    owner: root:root
    permissions: "0600"
    content: |
      ANTHROPIC_API_KEY=
      GEMINI_API_KEY=
      OPENCLAW_GATEWAY_TOKEN=REPLACE_ME
      OPENCLAW_GATEWAY_BIND=lan
      OPENCLAW_GATEWAY_PORT=18789
      OPENCLAW_BRIDGE_PORT=18790
      OPENCLAW_CONFIG_DIR=/root/.openclaw
      OPENCLAW_WORKSPACE_DIR=/root/.openclaw/workspace
      OPENCLAW_SANDBOX=
      OPENCLAW_DOCKER_SOCKET=/var/run/docker.sock
      OPENCLAW_HOME_VOLUME=
      OPENCLAW_EXTRA_MOUNTS=
      OPENCLAW_DOCKER_APT_PACKAGES=
      OPENCLAW_EXTENSIONS=
      OPENCLAW_INSTALL_DOCKER_CLI=
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=
